minimumLimaVersion: "2.0.0"

base:
  - template:docker

vmType: "vz"
mountType: "virtiofs"

cpus: 4
memory: "4GiB"
disk: "60GiB"

user:
  name: agent

mounts: []

provision:
  - mode: system
    script: |
      set -eux
      apt-get update
      apt-get install -y \
        curl git unzip zip ca-certificates gnupg rlwrap \
        build-essential pkg-config ripgrep \
        openssh-client jq gh

  - mode: user
    script: |
      set -eux

      if [ ! -x "$HOME/.local/bin/mise" ]; then
        curl https://mise.run | sh
      fi

      grep -q 'mise activate bash' "$HOME/.bashrc" || \
        echo 'eval "$($HOME/.local/bin/mise activate bash)"' >> "$HOME/.bashrc"
